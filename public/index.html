<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculadora Inteligente</title>

  <!-- 1. Anti-FOUC: aplica .dark antes de que Tailwind parsee -->
  <script type="module" src="js/theme-init.js"></script>

  <!-- 2. Tailwind Output (Compilado localmente) -->
  <link rel="stylesheet" href="css/input.css">

  <!-- 3. Tokens y overrides de tema -->
  <link rel="stylesheet" href="css/theme.css">

  <!-- 4. Estilos específicos de esta página -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="surface-base-bg min-h-screen py-8">

  <!-- Nav inyectada por mountNav -->
  <div id="appNav" data-active="index"></div>

  <div class="grid lg:grid-cols-2 gap-8">
    <!-- Panel de Configuración -->
    <div class="surface-card rounded-2xl p-6">
      <h2 class="text-2xl font-semibold text-themed mb-6 flex items-center">
        ⚙️ Configuración
      </h2>

      <!-- Selección de Producto -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-themed-secondary mb-2">
          Producto (Base de Datos)
        </label>

        <select id="productSelect" class="w-full p-3 bg-themed-input rounded-lg input-focus transition-all">
          <option value="custom">✏️ Producto personalizado</option>
        </select>


      </div>

      <!-- Precio personalizado -->
      <div id="customPriceDiv" class="mb-6 hidden">
        <label class="block text-sm font-medium text-themed-secondary mb-2">
          Precio del Equipo
        </label>
        <div class="flex gap-2">
          <input type="number" id="customPrice" placeholder="Ingresa el precio..."
            class="flex-1 p-3 bg-themed-input rounded-lg input-focus">
          <select id="customCurrency" class="p-3 bg-themed-input rounded-lg input-focus">
            <option value="USD">USD ($)</option>
            <option value="EUR">EUR (€)</option>
          </select>
        </div>
      </div>

      <div class="mt-3 flex items-center">
        <input type="checkbox" id="batteryFullCheckbox" class="mr-2" />
        <label for="batteryFullCheckbox" class="select-none cursor-pointer">
          Equipo del 95% al 100% de batería (+$20 USD)
        </label>
      </div>

      <!-- Método de Pago -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-themed-secondary mb-2">
          Método de Pago
        </label>
        <select id="paymentMethod" class="w-full p-3 bg-themed-input rounded-lg input-focus">
          <option value="transfer">🏦 Transferencia</option>
          <option value="cash">💵 Efectivo/Divisas</option>
          <option value="zelle">💳 Zelle</option>
          <option value="binance">₿ Binance</option>
          <option value="mixed">🔄 Pago Mixto</option>
        </select>
      </div>

      <!-- Pago Mixto -->
      <div id="mixedPaymentDiv" class="mb-6 hidden">
        <label class="block text-sm font-medium text-themed-secondary mb-2">
          Monto en Transferencia ($)
        </label>
        <input type="number" id="transferAmount" class="w-full p-3 bg-themed-input rounded-lg input-focus"
          placeholder="Cantidad a pagar por transferencia">
      </div>

      <!-- Tasa de Transferencia -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-themed-secondary mb-2">
          USDT Rate
        </label>
        <input type="password" id="transferRate" value="15" step="0.1"
          class="w-full p-3 bg-themed-input rounded-lg input-focus" placeholder="Ej: 15.5">
      </div>

      <!-- Valor API (simulado) -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-themed-secondary mb-2">
          Tasa BCV
        </label>
        <div class="bg-themed-section-blue border-themed rounded-lg p-3 mb-2">
          <div class="text-xs text-blue-600">
            Última actualización: <span id="lastUpdate">--:--:--</span>
          </div>
        </div>
        <div class="flex gap-2">
          <input type="number" id="apiValue" value="3.8" step="0.01"
            class="flex-1 p-3 bg-themed-input rounded-lg input-focus">
          <button onclick="updateApiValue()" class="px-4 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
            🔄 Actualizar API
          </button>
        </div>
      </div>

      <div class="bg-themed-section-purple border-themed rounded-lg p-4 text-center">
        <div class="flex items-center justify-center gap-2">
          <span class="animate-pulse">⚡</span>
          <span class="font-semibold">Cálculo en Tiempo Real Activado</span>
          <span class="animate-pulse">⚡</span>
        </div>
        <p class="text-sm mt-1 opacity-80">
          Los resultados se actualizan automáticamente
        </p>
      </div>
    </div>

    <!-- Panel de Resultados -->
    <div class="surface-card rounded-2xl p-6">
      <h2 class="text-2xl font-semibold text-themed mb-6 flex items-center">
        📊 Resultados
      </h2>

      <div id="results" class="space-y-4">
        <div class="text-center text-themed-muted py-8">
          <div class="text-6xl mb-4">🧮</div>
          <p>
            Configura los parámetros y presiona "Calcular" para ver los resultados
          </p>
        </div>
      </div>

      <!-- Comparación de Métodos -->
      <div id="comparison" class="mt-8 hidden">
        <h3 class="text-lg font-semibold text-themed mb-4 flex items-center">
          📈 Comparación de Métodos
        </h3>
        <div id="comparisonContent" class="space-y-3"></div>
      </div>
    </div>
  </div>
  </div>

  <!-- Lógica JavaScript -->
  <script src="script.js" type="module"></script>
  <!-- Nav compartida (la debe montar DESPUÉS del contenido para que el data-active funcione) -->
  <script type="module">
    import { mountNav } from './js/components/nav.js';
    mountNav('index');
  </script>
</body>

</html>
