<!DOCTYPE html>
<html lang="es"> 

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Diferencia (Reestructurada)</title>

  <!-- 1. Anti-FOUC: aplica .dark antes de que Tailwind parsee -->
  <script src="js/theme-init.js"></script>

  <!-- 2. Tailwind Output Local -->
  <link rel="stylesheet" href="css/tailwind-output.css">

  <!-- 3. Tokens y overrides de tema -->
  <link rel="stylesheet" href="css/theme.css">

  <!-- 4. Estilos específicos de esta página -->
  <link rel="stylesheet" href="./css/intercambio.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="flex justify-center min-h-screen p-4 surface-base-bg transition-colors">
  <!-- Nav montada por js/components/nav.js (compartida con el resto de páginas) -->
  <div id="appNav" data-active="intercambio"></div>

  <main class="grid grid-cols-1 lg:grid-cols-5 gap-8 w-full max-w-6xl mt-20">


    <section class="lg:col-span-2 surface-card p-6 shadow-lg card-shadow">
      <div class="flex items-center gap-3 mb-6">
        <div class="icono-titulo">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-themed">⚙ Configuración</h2>
      </div>
      <div class="space-y-5">
        <div>
          <label for="recibido" class="block mb-2 text-sm font-medium text-themed-secondary">Equipo Recibido:</label>
          <select id="recibido" class="campo-select">
            <option value="">Seleccionar Equipo a recibir...</option>
          </select>
        </div>
        <div>
          <label class="block mb-2 text-sm font-medium text-themed-secondary">Condiciones del Equipo Recibido</label>
          <div class="space-y-2 text-sm">
            <label class="flex items-center gap-2"><input type="checkbox" id="soloVentaChk"
                class="condicion campo-checkbox" value="-30"><span>Solo venta </span></label>

            <label class="flex items-center gap-2"><input type="checkbox" value="-30"
                class="condicion campo-checkbox"><span>Batería &lt; 80% </span></label>
            <label class="flex items-center gap-2"><input type="checkbox" value="-10"
                class="condicion campo-checkbox"><span>Sin caja </span></label>
            <label class="flex items-center gap-2"><input type="checkbox" value="-10"
                class="condicion campo-checkbox"><span>Bocinas dañadas </span></label>
          </div>
        </div>
      </div>
      <div id="tasas" class="panel-tasas mt-8">
        Cargando tasas...
      </div>
    </section>
    <section class="lg:col-span-3 surface-card p-6 shadow-lg space-y-6 card-shadow">
      <div class="flex items-center gap-3">
        <div class="icono-titulo">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
        </div>
        <h2 id="resultado-titulo" class="text-2xl font-bold text-themed">📊 Comparativa Global de Intercambio</h2>
      </div>
      <div id="resultado" class="panel-info p-5 space-y-3 overflow-x-auto">
        <p class="text-themed-muted">Selecciona el equipo recibido para ver la tabla comparativa.</p>
      </div>
    </section>
  </main>
  <script type="module">
    import { PRECIOS_VENTA, PRECIOS_RECIBIDOS } from './js/config/precios.js'; // Importar listas de precios

    document.addEventListener('DOMContentLoaded', async () => {
      // === DATOS (importados de prices.js) ===
      const recibidos = PRECIOS_RECIBIDOS;
      const ventas = PRECIOS_VENTA;

      // === ELEMENTOS DEL DOM ===
      const selRecibido = document.getElementById('recibido');
      const condiciones = document.querySelectorAll('.condicion');
      const tasasDiv = document.getElementById('tasas');
      const resultadoDiv = document.getElementById('resultado');

      // === LLENAR SELECT DE RECIBIDOS ===
      recibidos.forEach(p =>
        selRecibido.innerHTML += `<option value="${p.usd}">${p.nombre}</option>`
      );

      // === ESTADO DE TASAS (SIMULADO/MODIFIQUE SEGÚN SU API) ===
      async function fetchTasa(url, tasa) {
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          // El valor viene como string, lo convertimos a número
          if (tasa === "BCV") {
            return parseFloat(data.rates.VES);
          } else if (tasa === "BNC") {
            return /* data.stats.trimmedAverage || */ data.stats.max;
          }
          //return parseFloat(data.rates.VES);
        } catch (err) {
          console.error(`Error obteniendo tasa ${tasa}:`, err);
          return null;
        }
      }
      let tasaBinance = await fetchTasa("/.netlify/functions/binance-p2p-average?asset=USDT&fiat=VES&tradeType=SELL&rows=20&trim=0.1", "BNC")
      let tasaBCV = await fetchTasa("https://open.er-api.com/v6/latest/EUR", "BCV")

      tasasDiv.textContent = `BNC: ${tasaBinance.toFixed(2)} | Tasa BCV: Bs ${tasaBCV.toFixed(2)}`;

      // === FUNCIONES DE FORMATEO ===
      const formatUSD = num =>
        `$${num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      const formatBS = num =>
        `Bs ${num.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

      // === FUNCIÓN DE CÁLCULO NUEVA (TABLA GLOBAL) ===
      function calcular() {
        if (!tasaBinance || !tasaBCV || !selRecibido.value) {
          resultadoDiv.innerHTML = `<p class="text-themed-muted">Selecciona el equipo recibido para ver la tabla comparativa.</p>`;
          return;
        }

        let precioRecibido = parseFloat(selRecibido.value);
        condiciones.forEach(chk => {
          if (chk.checked) {
            precioRecibido += parseFloat(chk.value);
          }
        });

        // Verifica si "Solo venta" está activado
        const soloVentaChk = document.getElementById('soloVentaChk');
        if (soloVentaChk && soloVentaChk.checked) {
          const totalBs = precioRecibido * tasaBinance;
          resultadoDiv.innerHTML = `
          <div class="bloque-solo-venta mb-6 flex flex-col gap-2">
            <span class="text-themed-secondary font-medium">Monto recibido (ajustado):</span>
            <span class="texto-valor-exito font-bold text-xl">${formatUSD(precioRecibido)}</span>
            <hr class="separador-sutil"/>
            <span class="text-themed-secondary font-medium">Total a cancelar al cliente:</span>
            <span class="texto-valor-acento font-bold text-lg">${formatBS(totalBs)}</span>
          </div>
          <div class="mt-2 text-themed-muted text-sm">Modo solo venta: entrega directa de efectivo, sin tabla comparativa.</div>
        `;
          return;
        }

        // Modo tabla comparativa (normal)
        let bloqueRecibido = `
      <div class="bloque-recibido mb-6 flex justify-between items-center">
        <span class="text-themed-secondary font-medium">Monto recibido (ajustado):</span>
        <span class="texto-valor-acento font-bold text-xl">${formatUSD(precioRecibido)}</span>
      </div>
    `;

        let tabla = `<table class="tabla-comparativa">
        <thead>
          <tr>
            <th>Equipo de Venta</th>
            <th class="derecha">Diferencia USD</th>
            <th class="derecha">Equivalente Bolívares</th>
            <th class="derecha">Equiv. BCV USD</th>
          </tr>
        </thead>
        <tbody>`;

        ventas.forEach(venta => {
          const diferenciaUSD = venta.usd - precioRecibido;
          if (/* diferenciaUSD > 0 */0 < 1) {
            const diferenciaBs = diferenciaUSD * tasaBinance;
            const diferenciaBCV = diferenciaBs / tasaBCV;
            tabla += `<tr>
                <td>${venta.nombre}</td>
                <td class="derecha">${formatUSD(diferenciaUSD)}</td>
                <td class="derecha">${formatBS(diferenciaBs)}</td>
                <td class="derecha">${formatUSD(diferenciaBCV)}</td>
            </tr>`;
          }
        });
        tabla += '</tbody></table>';

        resultadoDiv.innerHTML = bloqueRecibido + tabla;
      }


      // === EVENTOS ===
      selRecibido.addEventListener('change', calcular);
      condiciones.forEach(chk => chk.addEventListener('change', calcular));

    });
  </script>

  <!-- Montar nav + tema (igual que el resto de páginas) -->
  <script type="module">
    import { mountNav } from './js/components/nav.js';
    import { initTheme, onThemeChange } from './js/theme.js';
    import { mountThemeToggle } from './js/components/themeToggle.js';

    initTheme();
    mountNav('intercambio');
    mountThemeToggle();

    onThemeChange(() => { /* hook opcional */ });
  </script>
</body>

</html>
