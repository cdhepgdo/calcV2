<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Precios en Bs</title>

  <!-- 1. Anti-FOUC: aplica .dark antes de que Tailwind parsee -->
  <script src="js/theme-init.js"></script>

  <!-- 2. Tailwind Output Local -->
  <link rel="stylesheet" href="css/tailwind-output.css">

  <!-- 3. Tokens y overrides de tema -->
  <link rel="stylesheet" href="css/theme.css">

  <!-- 4. Estilos específicos de esta página -->
  <link rel="stylesheet" href="./css/lista.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body class="surface-base-bg transition-colors">
  <!-- Nav montada por js/components/nav.js (compartida con el resto de páginas) -->
  <div id="appNav" data-active="lista"></div>

  <main class="max-w-screen-xl mx-auto px-4 pb-10 pt-4">
    <h1 class="text-2xl font-bold text-center mb-2">💱 Lista de Precios en Bs</h1>
    <p id="tasa" class="text-center mb-4" style="color: rgb(var(--text-muted));">Cargando tasa...</p>

    <div class="flex flex-wrap gap-3 my-5">
      <button id="btnImprimir" class="btn-Accion">🖨 Imprimir lista</button>
      <button id="btnDescargar" class="btn-Accion">💾 Descargar CSV</button>
      <a href="/" class="btn-Accion">💱 Volver a Calculadora</a>
    </div>

    <div class="mb-4 flex items-center gap-2">
      <input type="checkbox" id="batteryFullCheckbox" class="rounded accent-indigo-500 w-4 h-4">
      <label for="batteryFullCheckbox" class="select-none cursor-pointer">
        Equipo del 95% al 100% de batería (+$20 USD)
      </label>
    </div>

    <div class="surface-card overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio Bs</th>
            <th>Estimado € BCV</th>
            <th>Oferta Divisas</th>
          </tr>
        </thead>
        <tbody id="tabla-productos"></tbody>
      </table>
    </div>
  </main>

  <!-- Lógica de la página: tabla + APIs externas -->
  <script type="module">
    import { PRECIOS_VENTA } from './js/config/precios.js';

    // Estado
    const productos = PRECIOS_VENTA;
    let promedioActual = 0;
    let tasaBCVActual = 0;

    // Helpers
    const $ = (id) => document.getElementById(id);
    const batteryFullCheckbox = $('batteryFullCheckbox');

    /**
     * Suma $20 USD si el equipo está entre 95% y 100% de batería.
     */
    function getPrecioAjustado(precioBase) {
      return batteryFullCheckbox?.checked ? precioBase + 20 : precioBase;
    }

    /**
     * Renderiza la tabla de precios. El JS no conoce colores:
     * usa la clase semántica .precio-bs que el CSS resuelve por modo.
     */
    function renderTable(promedio, bcv) {
      const tbody = $('tabla-productos');
      tbody.innerHTML = productos.map(p => {
        const precioFinalUSD = getPrecioAjustado(p.usd);
        const precioBs = precioFinalUSD * promedio;
        const precioFormateado = Math.round(precioBs).toLocaleString('es-VE');
        const estimadoBCV = precioBs / bcv;

        return `<tr>
          <td>${p.nombre}</td>
          <td class="precio-bs">Bs ${precioFormateado}</td>
          <td>€${estimadoBCV.toFixed(2)} (BCV)</td>
          <td>*$${precioFinalUSD.toFixed(2)} (Divisas/Zelle/Binance)*</td>
        </tr>`;
      }).join('');
    }

    /** Tasa BCV referencial (EUR → VES). */
    async function fetchTasaBCV() {
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/EUR');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return parseFloat(data.rates.VES);
      } catch (err) {
        console.error('Error obteniendo tasa BCV:', err);
        return null;
      }
    }

    /** Trae la tasa Binance P2P, calcula BCV y dispara el render. */
    async function fetchTasaYCalcular() {
      try {
        const res = await fetch('/.netlify/functions/binance-p2p-average?asset=USDT&fiat=VES&tradeType=SELL&rows=20&trim=0.1');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.message || 'Respuesta no válida');

        // Usamos el máximo como referencia conservadora
        const promedio = parseFloat(data.stats.max.toFixed(2));
        promedioActual = promedio;

        const tasaBCV = await fetchTasaBCV();
        if (!tasaBCV) throw new Error('No se pudo obtener la tasa BCV');
        tasaBCVActual = tasaBCV;

        $('tasa').textContent = `BNC: ${parseInt(promedio)}`;
        renderTable(promedioActual, tasaBCVActual);
      } catch (err) {
        console.error(err);
        $('tasa').textContent = 'Error al obtener tasa';
      }
    }

    /** Botón imprimir → diálogo nativo del navegador. */
    $('btnImprimir')?.addEventListener('click', () => window.print());

    /** Botón descargar CSV → genera Blob y dispara descarga. */
    $('btnDescargar')?.addEventListener('click', () => {
      const filas = document.querySelectorAll('#tabla-productos tr');
      let csv = 'Producto,Precio Bs\n';
      filas.forEach(fila => {
        const cols = fila.querySelectorAll('td');
        const producto = cols[0].innerText;
        const precio = cols[1].innerText.replace('Bs', '').trim();
        csv += `"${producto}",${precio}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const enlace = document.createElement('a');
      enlace.href = url;
      enlace.download = 'lista_precios.csv';
      enlace.click();
      URL.revokeObjectURL(url);
    });

    /** Recalcular cuando cambia el toggle de batería. */
    batteryFullCheckbox?.addEventListener('change', () => {
      if (promedioActual && tasaBCVActual) renderTable(promedioActual, tasaBCVActual);
    });

    // Bootstrap
    fetchTasaYCalcular();
  </script>

  <!-- Montar nav + tema -->
  <script type="module">
    import { mountNav } from './js/components/nav.js';
    import { initTheme, onThemeChange } from './js/theme.js';
    import { mountThemeToggle } from './js/components/themeToggle.js';

    initTheme();
    mountNav('lista');
    mountThemeToggle();

    onThemeChange(() => { /* hook opcional */ });
  </script>
</body>

</html>
